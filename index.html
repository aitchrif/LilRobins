<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIL ROBINS | COMING SOON</title>
    <style>
        body {
            background-color: #000000;
            color: #CCFF00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            letter-spacing: -2px;

            text-transform: uppercase;
        }
        .tagline {
            font-size: 1.2rem;
            margin-bottom: 40px;
            opacity: 0.8;
        }
        .gif-frame {
            width: 400px;
            height: 400px;
            border: 2px solid #CCFF00;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #111;
        }
        img {
            max-width: 100%;
            height: auto;
        }
        /* تصميم الرابط ديال X */
        .socials {

        }
        .socials a {

            font-size: 1.2rem;
            border: 1px solid #CCFF00;
            padding: 10px 20px;
            transition: 0.3s;
        }
        .socials a:hover {

        }

</head>
<body>
